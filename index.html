<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
    <img src="your-image.jpg" alt="Image" class="img-fluid">
    <h1>bootstrap-heading 1</h1>
    <!-- class="lead" is used to create a lead paragraph, which is typically larger and more prominent than regular paragraphs. It is often used to highlight important information or to create a visually appealing introduction to a section of content. -->
    <p class="lead">This is a lead paragraph. It stands out from regular paragraphs and is often used to highlight important information or to create a visually appealing introduction to a section of content.</p>    
    <button type="button" class="btn btn-success">Success Button</button>
    <button type="button" class="btn btn-danger">Danger Button
    <span type="button" class="badge bg-primary">primary</span></button>
</body>
</html>
